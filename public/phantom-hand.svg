  </g>

  <!-- Finger 2: Index -->
  <g id="right-finger-2" class="phantom-finger">
    <path d="M155 115 Q150 55 155 20 Q158 5 168 8 Q178 12 175 30 Q170 65 168 115 Z"
          fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <ellipse cx="163" cy="16" rx="12" ry="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>

  <!-- Finger 3: Middle -->
  <g id="right-finger-3" class="phantom-finger">
    <path d="M200 110 Q200 45 202 10 Q204 0 215 2 Q226 4 224 20 Q220 55 216 110 Z"
          fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
