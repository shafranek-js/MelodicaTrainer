<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Right hand, top-down view, semi-transparent phantom style -->

  <!-- Palm -->
  <path id="palm" d="M120 120 Q200 60 280 100 Q320 120 310 160 Q300 200 250 210 Q180 220 130 190 Q100 170 110 140 Z"
        fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Finger 1: Thumb -->
  <g id="right-finger-1" class="phantom-finger">
    <path d="M120 140 Q90 120 70 80 Q55 50 75 40 Q95 32 110 60 Q125 90 130 130 Z"
          fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
