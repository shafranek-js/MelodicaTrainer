  </g>

  <!-- Finger 4: Ring -->
  <g id="right-finger-4" class="phantom-finger">
    <path d="M245 115 Q250 55 255 20 Q258 8 268 12 Q278 16 274 35 Q268 65 262 115 Z"
          fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
