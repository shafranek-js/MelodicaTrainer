<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" fill="none">
  <!-- 
    Right hand, top-down view.
    ViewBox: 200 × 210
    Finger tip coordinates (x2, y2):
      1 (Thumb):  15, 95
      2 (Index):  55, 35
      3 (Middle): 100, 20
      4 (Ring):   140, 35
      5 (Pinky):  175, 70
    Palm base around y=110-200, fingers extend upward from y=110.
    Gray outline + white core layers — core opacity controlled by React.
  -->

  <!-- Finger 1: Thumb (base 50,145 → tip 15,95) -->
  <g>
    <line x1="50" y1="145" x2="15" y2="95" stroke="rgba(128,128,128,0.5)" stroke-width="24" stroke-linecap="round" />
  </g>
  <g id="finger-1-core">
    <line x1="50" y1="145" x2="15" y2="95" stroke="rgba(255,255,255,0.85)" stroke-width="20" stroke-linecap="round" />
  </g>

  <!-- Finger 2: Index (base 70,115 → tip 55,35) -->
  <g>
    <line x1="70" y1="115" x2="55" y2="35" stroke="rgba(128,128,128,0.5)" stroke-width="20" stroke-linecap="round" />
  </g>
  <g id="finger-2-core">
    <line x1="70" y1="115" x2="55" y2="35" stroke="rgba(255,255,255,0.85)" stroke-width="16" stroke-linecap="round" />
  </g>

  <!-- Finger 3: Middle (base 100,110 → tip 100,20) -->
  <g>
    <line x1="100" y1="110" x2="100" y2="20" stroke="rgba(128,128,128,0.5)" stroke-width="22" stroke-linecap="round" />
  </g>
  <g id="finger-3-core">
    <line x1="100" y1="110" x2="100" y2="20" stroke="rgba(255,255,255,0.85)" stroke-width="18" stroke-linecap="round" />
  </g>

  <!-- Finger 4: Ring (base 130,115 → tip 140,35) -->
  <g>
    <line x1="130" y1="115" x2="140" y2="35" stroke="rgba(128,128,128,0.5)" stroke-width="18" stroke-linecap="round" />
  </g>
  <g id="finger-4-core">
    <line x1="130" y1="115" x2="140" y2="35" stroke="rgba(255,255,255,0.85)" stroke-width="14" stroke-linecap="round" />
  </g>

  <!-- Finger 5: Pinky (base 155,130 → tip 175,70) -->
  <g>
    <line x1="155" y1="130" x2="175" y2="70" stroke="rgba(128,128,128,0.5)" stroke-width="16" stroke-linecap="round" />
  </g>
  <g id="finger-5-core">
    <line x1="155" y1="130" x2="175" y2="70" stroke="rgba(255,255,255,0.85)" stroke-width="12" stroke-linecap="round" />
  </g>

  <!-- Palm -->
  <g>
    <path 
      d="M 45 145 Q 70 110 100 110 Q 130 110 160 135 Q 165 170 130 195 Q 100 200 70 195 Q 40 180 45 145 Z" 
      fill="rgba(255,255,255,0.25)" 
      stroke="rgba(128,128,128,0.5)" 
      stroke-width="2" 
    />
  </g>
</svg>
